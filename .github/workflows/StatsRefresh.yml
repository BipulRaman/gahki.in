name: Daily Usage Refresh

# Triggers the API's async usage-refresh worker (POST /api/jobs/usage-refresh).
# Needs secret GAHKI_API_KEY and variable GAHKI_API_BASE_URL.
# Manual run: Actions tab -> "Run workflow" (optionally pass a shopId).

on:
  schedule:
    - cron: '30 20 * * *'   # 02:00 IST daily
  workflow_dispatch:
    inputs:
      shop_id:
        description: 'Optional shopId (blank = all active shops)'
        required: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Submit refresh job
        env:
          BASE: ${{ vars.GAHKI_API_BASE_URL }}
          KEY:  ${{ secrets.GAHKI_API_KEY }}
          SHOP: ${{ github.event.inputs.shop_id }}
        run: |
          set -euo pipefail
          url="${BASE}/api/jobs/usage-refresh${SHOP:+?shopId=$SHOP}"
          echo "POST $url"
          code=$(curl -sS -o /dev/stderr -w "%{http_code}" \
                      -X POST "$url" -H "X-Api-Key: $KEY")
          echo "HTTP $code"
          # 202 = accepted, 409 = already running -> both fine
          [[ "$code" == "202" || "$code" == "409" ]]
